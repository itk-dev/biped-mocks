<!-- Claude Code Browser Feedback Widget (dev only) -->
<script>
  (function() {
    var h = location.hostname;
    var isDevHost = /^localhost$/i.test(h) || /^127\.0\.0\.1$/i.test(h) || /^.*\.local$/i.test(h) || /^.*\.local\..*$/i.test(h) || /^.*\.test$/i.test(h) || /^.*\.dev$/i.test(h) || /^.*\.ddev\.site$/i.test(h);
    if (isDevHost) {
      var s = document.createElement('script');
      s.src = 'http://localhost:9877/widget.js';
      s.id = 'claude-feedback-widget-script';
      document.body.appendChild(s);
    }
  })();
</script>
